<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre - Settings Controller</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Bypassing localStorage security errors in sandbox and custom browser environments
        (function() {
            try {
                var test = window.localStorage;
            } catch (e) {
                var store = {};
                Object.defineProperty(window, 'localStorage', {
                    value: {
                        getItem: function(key) { return store[key] || null; },
                        setItem: function(key, val) { store[key] = String(val); },
                        removeItem: function(key) { delete store[key]; },
                        clear: function() { store = {}; },
                        key: function(i) { return Object.keys(store)[i] || null; },
                        get length() { return Object.keys(store).length; }
                    },
                    writable: true,
                    configurable: true
                });
            }
        })();
    </script>
    <script>
        // Setup PySide6 WebChannel globally for the main overlay
        window.captureCallbacks = {};
        if (typeof qt !== 'undefined' && !window.QWebChannelInitDone) {
            window.QWebChannelInitDone = true;
            const s = document.createElement('script');
            s.src = 'qrc:///qtwebchannel/qwebchannel.js';
            s.onload = () => {
                new QWebChannel(qt.webChannelTransport, function (channel) {
                    window.qtBridge = channel.objects.qtBridge;
                    if (window.qtBridge && window.qtBridge.captured) {
                        window.qtBridge.captured.connect(function(pid, base64) {
                            if (window.captureCallbacks[pid]) {
                                window.captureCallbacks[pid](base64);
                            }
                        });
                    }
                });
            };
            document.head.appendChild(s);
        }
    </script>
</head>
<body class="config-body" x-data="settingsApp" x-init="isOpen = true">
    <!-- Mouseover Status Overlay -->
    <div id="status-overlay" style="opacity: 1; pointer-events: auto;">
        <div class="status-indicator">
            <span class="dot" id="backend-status-dot" style="color: #ffaa00;"></span>
            <span id="backend-status-msg" style="color: #ffaa00;">Backend: Connecting...</span>
        </div>
        <div class="status-indicator">
            <span class="dot" id="obs-status-dot" style="color: #ff4444;"></span>
            <span id="obs-status-msg" style="color: #ff4444;">OBS: Offline</span>
        </div>
    </div>

    <!-- Configure UI Overlay (Always active on Settings Page) -->
    <div id="ui-layer" class="active" style="position: relative; min-height: 100vh; opacity: 1; transform: none; pointer-events: auto; display: flex; justify-content: center; align-items: center;">
        <div id="settings-panel">
            <div class="tabs">
                <button class="tab-button" :class="{ 'active': activeTab === 'object' }" @click="activeTab = 'object'">Object</button>
                <button class="tab-button" :class="{ 'active': activeTab === 'source' }" @click="activeTab = 'source'">Source</button>
                <button class="tab-button" :class="{ 'active': activeTab === 'trigger' }" @click="activeTab = 'trigger'">Trigger and Action</button>
                <button class="tab-button" :class="{ 'active': activeTab === 'preferences' }" @click="activeTab = 'preferences'">Preference</button>
                <button id="save-all-btn" @click="saveAll()">💾 Save All</button>
            </div>
            
            <div class="tab-content" :class="{ 'active': activeTab === 'object' }" x-show="activeTab === 'object'" id="tab-object">
                <h3>Object Inventory</h3>
                <div class="setting-group">
                    <label class="checkbox-label">
                        <input type="checkbox" x-model="config.hasFloor" @change="saveConfigRaw()"> Enable Physics Floor
                    </label>
                </div>
                <div class="button-row" style="display: flex; flex-wrap: wrap; gap: 10px;">
                    <button class="action-btn" @click="addObject('image')">+ Add Throwable</button>
                    <button class="action-btn" @click="addObject('audio')">+ Add Audio</button>
                    <button class="action-btn" style="background: rgba(0,200,255,0.15); border-color: #00c8ff; color: #00c8ff;" @click="addObject('snapshot')">📷 Add Snapshot</button>
                    <button class="action-btn" style="background: rgba(0,170,255,0.18); border-color: #00aaff; color: #66ccff;" @click="addObject('webgl-water')">🌀 Add WebGL Water</button>
                    <button class="action-btn" style="background: rgba(255,85,0,0.18); border-color: #ff5500; color: #ff8833;" @click="addObject('webgl-fire')">🔥 Add WebGL Fire</button>
                    <button class="action-btn" style="background: rgba(180,220,255,0.18); border-color: #b4dcff; color: #b4dcff;" @click="addObject('webgl-lightning')">⚡ Add WebGL Lightning</button>
                </div>
                
                <div id="object-inventory">
                    <template x-for="(obj, index) in config.objects" :key="obj.id">
                        <div class="object-sub-window" :class="'type-' + obj.type" :data-id="obj.id" x-data="{ collapsed: true }">
                            <div class="window-header" style="cursor: pointer; user-select: none;" @click="collapsed = !collapsed">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="font-size: 11px; transition: transform 0.2s; display: inline-block; color: #aaa;" :style="collapsed ? '' : 'transform: rotate(90deg);'">▶</span>
                                    <h4 style="margin: 0; color: #fff;" x-text="(obj.name || 'Unnamed') + ' (' + (obj.type === 'audio' ? 'Audio' : (obj.type === 'snapshot' ? 'Camera Snapshot' : (obj.type === 'webgl-water' ? 'WebGL Water' : (obj.type === 'webgl-fire' ? 'WebGL Fire' : (obj.type === 'webgl-lightning' ? 'WebGL Lightning' : 'Throwable'))))) + ')'"></h4>
                                </div>
                                <button class="trash-btn" style="padding: 5px 10px; font-size: 12px; border-radius: 4px;" @click.stop="deleteObject(obj.id)">Delete</button>
                            </div>
                            <div x-show="!collapsed" style="margin-top: 15px;">
                            
                            <div class="setting-group" style="flex-direction:row; gap:10px;">
                                <div style="flex:1;">
                                    <label>Identifier Name</label>
                                    <input type="text" x-model="obj.name" placeholder="e.g. Banana" style="width:100%;" @change="saveConfigRaw()">
                                </div>
                            </div>
                            
                            <!-- If type is image -->
                            <div x-show="obj.type === 'image'">
                                    <div style="display:flex; gap:15px; margin-bottom:10px;">
                                        <div style="flex:0.6; display:flex; flex-direction:column; gap:10px;">
                                            <label>Asset File (Image or GIF)</label>
                                            <input type="file" accept="image/*" @change="uploadImageFile($event, obj)">
                                            <div style="font-size:12px; color:#aaa;">(GIFs stay intact, PNG/JPG are compressed for speed)</div>
                                        </div>
                                        <div style="flex:0.4; display:flex; flex-direction:column; align-items:center; gap:5px;" class="preview-container">
                                            <div style="width:240px; height:240px; border:1px solid #444; background:#111; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative;" class="preview-box">
                                                <img :src="obj.imageSrc" x-show="obj.imageSrc" :style="'width: ' + (obj.width || 100) + 'px; height: ' + (obj.height || 100) + 'px; max-width: 100%; max-height: 100%; object-fit: contain;'" />
                                                <span style="color:#666; font-size:12px;" x-show="!obj.imageSrc">No Preview</span>
                                            </div>
                                            <div style="width:100%;" x-show="obj.imageSrc">
                                                <label style="font-size:10px; color:#aaa; margin-bottom: 2px; text-align: center; display: block;">Size: <span x-text="obj.width || 100"></span>x<span x-text="obj.height || 100"></span>px | Scale (<span x-text="parseFloat(obj.scale || 1.0).toFixed(2)"></span>x)</label>
                                                <input type="range" min="0.1" max="3.0" step="0.05" x-model="obj.scale" 
                                                       @input="
                                                           if (!obj.originalWidth) obj.originalWidth = obj.width || 100;
                                                           if (!obj.originalHeight) obj.originalHeight = obj.height || 100;
                                                           obj.width = Math.round(obj.originalWidth * parseFloat(obj.scale || 1.0)); 
                                                           obj.height = Math.round(obj.originalHeight * parseFloat(obj.scale || 1.0));
                                                           saveConfigRaw();
                                                       " style="width: 100%;">
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="setting-group" style="margin-bottom:10px;">
                                        <label>Target Destination</label>
                                        <select x-model="obj.target" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #555; border-radius: 4px;" @change="saveConfigRaw()">
                                            <option value="avatar">Avatar (Default)</option>
                                            <template x-for="t in config.targets" :key="t.id">
                                                <option :value="t.name || t.id" x-text="t.name"></option>
                                            </template>
                                        </select>
                                    </div>
                                    
                                    <div class="setting-group" style="margin-bottom:10px;">
                                        <label>Throw Source Action</label>
                                        <div class="pill-group" style="display:flex; flex-wrap:wrap; gap:5px;">
                                            <div class="pill-btn" :class="{ 'active': config.objects[index].action === 'throwable' }" @click="config.objects[index].action = 'throwable'; saveConfigRaw()">Throw at Target</div>
                                            <div class="pill-btn" :class="{ 'active': config.objects[index].action === 'throw-front' }" @click="config.objects[index].action = 'throw-front'; saveConfigRaw()">Throw Forward (From Screen)</div>
                                            <div class="pill-btn" :class="{ 'active': config.objects[index].action === 'swirl' }" @click="config.objects[index].action = 'swirl'; saveConfigRaw()">Swirl Throw</div>
                                            <div class="pill-btn" :class="{ 'active': config.objects[index].action === 'drop' }" @click="config.objects[index].action = 'drop'; saveConfigRaw()">Drop straight down</div>
                                            <div class="pill-btn" :class="{ 'active': config.objects[index].action === 'rain' }" @click="config.objects[index].action = 'rain'; saveConfigRaw()">Rain from above</div>
                                        </div>
                                    </div>
                                    
                                    <div class="setting-group" style="margin-bottom:15px;">
                                        <label>Spawn Source Grid (Randomized Origins)</label>
                                        <div style="display: grid; grid-template-columns: repeat(3, 30px); grid-template-rows: repeat(3, 30px); gap: 8px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; width: fit-content; border: 1px solid #444;">
                                            <template x-for="pos in ['tl', 'tc', 'tr', 'ml', 'mc', 'mr', 'bl', 'bc', 'br']">
                                                <input type="checkbox" :checked="obj.spawnPoints && obj.spawnPoints.includes(pos)"
                                                       @change="
                                                           if ($el.checked) {
                                                               if (!obj.spawnPoints) obj.spawnPoints = [];
                                                               if (!obj.spawnPoints.includes(pos)) obj.spawnPoints.push(pos);
                                                           } else {
                                                               obj.spawnPoints = obj.spawnPoints.filter(p => p !== pos);
                                                           }
                                                           saveConfigRaw();
                                                       " :title="pos" style="width:20px; height:20px; cursor:pointer;">
                                            </template>
                                        </div>
                                    </div>
                                    
                                    <div class="setting-group" style="margin-bottom:10px;">
                                        <label>Target Collision Behavior</label>
                                        <div class="pill-group">
                                            <div class="pill-btn" :class="{ 'active': config.objects[index].collision === 'bounce' }" @click="config.objects[index].collision = 'bounce'; saveConfigRaw()">Bounce Off</div>
                                            <div class="pill-btn" :class="{ 'active': config.objects[index].collision === 'stick' }" @click="config.objects[index].collision = 'stick'; saveConfigRaw()">Stick to Target</div>
                                            <div class="pill-btn" :class="{ 'active': config.objects[index].collision === 'squish' }" @click="config.objects[index].collision = 'squish'; saveConfigRaw()">Squish & Slide Down</div>
                                            <div class="pill-btn" :class="{ 'active': config.objects[index].collision === 'pixel-shatter' }" @click="config.objects[index].collision = 'pixel-shatter'; saveConfigRaw()">Pixel Shatter</div>
                                            <div class="pill-btn" :class="{ 'active': config.objects[index].collision === 'pass' }" @click="config.objects[index].collision = 'pass'; saveConfigRaw()">Pass Through</div>
                                        </div>
                                    </div>
                                    
                                    <div class="setting-group" style="margin-bottom:10px; display:flex; gap:15px;">
                                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #fff; font-size: 13px;">
                                            <input type="checkbox" x-model="obj.snapBottom" @change="saveConfigRaw()" style="width: 16px; height: 16px;"> Snap Bottom to Target Center
                                        </label>
                                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #fff; font-size: 13px;">
                                            <input type="checkbox" x-model="obj.randomMirror" @change="saveConfigRaw()" style="width: 16px; height: 16px;"> Random Mirroring
                                        </label>
                                    </div>
                            </div>

                            
                            <!-- If type is audio -->
                            <template x-if="obj.type === 'audio'">
                                <div class="setting-group" style="flex-direction:row; gap:10px; padding-top:10px;">
                                    <div style="flex:1;">
                                        <label>Audio File</label>
                                        <input type="file" accept="audio/*" @change="uploadAudioFile($event, obj)">
                                        <div class="start-sound-status" style="font-size:12px; color:#aaa; margin-top:5px;" x-text="obj.startSound ? 'Sound loaded' : 'No sound loaded'" :style="obj.startSound ? 'color:#00ffcc;' : 'color:#aaa;'"></div>
                                    </div>
                                </div>
                            </template>

                            <!-- If type is snapshot -->
                            <template x-if="obj.type === 'snapshot'">
                                <div style="padding-top:10px;">
                                    <p style="font-size:11px; color:#aaa; margin:0 0 10px 0;">Captures a live screenshot from OBS at throw-time and cuts out the background using the tracking mask.</p>

                                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                                        <div style="flex:1;">
                                            <label style="font-size:11px; color:#ccc;">OBS Source to Capture</label>
                                            <select style="width:100%; padding:10px; background:rgba(0,0,0,0.5); color:#fff; border:1px solid #555; border-radius:4px;"
                                                x-model="obj.obsSource"
                                                @change="saveConfigRaw()">
                                                <option value="">Select a target source...</option>
                                                <template x-for="t in config.targets" :key="t.id">
                                                    <option :value="t.obsSource" x-text="t.name + (t.obsSource ? ' (' + t.obsSource + ')' : '')"></option>
                                                </template>
                                            </select>
                                        </div>
                                    </div>

                                    <div style="margin-bottom:10px;">
                                        <label style="font-size:11px; color:#ccc;">Brightness Threshold (<span x-text="obj.brightnessThreshold !== undefined ? obj.brightnessThreshold : 40"></span>)</label>
                                        <input type="range" min="0" max="255" step="1" x-model.number="obj.brightnessThreshold" @input="saveConfigRaw()" style="width:100%;">
                                        <div style="font-size:10px; color:#888;">Pixels darker than this value become transparent. Higher = more aggressive cutout.</div>
                                    </div>

                                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                                        <div style="flex:1;">
                                            <label style="font-size:11px; color:#ccc;">Object Height (px) — <span x-text="obj.targetHeight || 200"></span>px</label>
                                            <input type="range" min="50" max="600" step="10" x-model.number="obj.targetHeight" @input="saveConfigRaw()" style="width:100%;">
                                        </div>
                                        <div style="flex:1;">
                                            <label style="font-size:11px; color:#ccc;">Target</label>
                                            <select x-model="obj.target" style="width:100%; padding:10px; background:rgba(0,0,0,0.5); color:#fff; border:1px solid #555; border-radius:4px;" @change="saveConfigRaw()">
                                                <option value="avatar">Avatar (Default)</option>
                                                <template x-for="t in config.targets" :key="t.id">
                                                    <option :value="t.name || t.id" x-text="t.name"></option>
                                                </template>
                                            </select>
                                        </div>
                                    </div>

                                     <div class="setting-group" style="margin-bottom:10px;">
                                         <label>Throw Action</label>
                                         <div class="pill-group" style="display:flex; flex-wrap:wrap; gap:5px;">
                                             <div class="pill-btn" :class="{ 'active': obj.action === 'throwable' }" @click="obj.action = 'throwable'; saveConfigRaw()">Throw at Target</div>
                                             <div class="pill-btn" :class="{ 'active': obj.action === 'throw-front' }" @click="obj.action = 'throw-front'; saveConfigRaw()">Throw Forward</div>
                                             <div class="pill-btn" :class="{ 'active': obj.action === 'swirl' }" @click="obj.action = 'swirl'; saveConfigRaw()">Swirl</div>
                                             <div class="pill-btn" :class="{ 'active': obj.action === 'drop' }" @click="obj.action = 'drop'; saveConfigRaw()">Drop</div>
                                             <div class="pill-btn" :class="{ 'active': obj.action === 'rain' }" @click="obj.action = 'rain'; saveConfigRaw()">Rain</div>
                                         </div>
                                     </div>

                                     <div class="setting-group" style="margin-bottom:15px;" x-show="obj.action === 'throwable'">
                                         <label>Spawn Source Grid (Randomized Origins)</label>
                                         <div style="display: grid; grid-template-columns: repeat(3, 30px); grid-template-rows: repeat(3, 30px); gap: 8px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; width: fit-content; border: 1px solid #444;">
                                             <template x-for="pos in ['tl', 'tc', 'tr', 'ml', 'mc', 'mr', 'bl', 'bc', 'br']">
                                                 <input type="checkbox" :checked="obj.spawnPoints && obj.spawnPoints.includes(pos)"
                                                        @change="
                                                            if ($el.checked) {
                                                                if (!obj.spawnPoints) obj.spawnPoints = [];
                                                                if (!obj.spawnPoints.includes(pos)) obj.spawnPoints.push(pos);
                                                            } else {
                                                                obj.spawnPoints = obj.spawnPoints.filter(p => p !== pos);
                                                            }
                                                            saveConfigRaw();
                                                        " :title="pos" style="width:20px; height:20px; cursor:pointer;">
                                             </template>
                                         </div>
                                     </div>

                                    <div class="setting-group" style="margin-bottom:10px;">
                                        <label>Collision Behavior</label>
                                        <div class="pill-group">
                                            <div class="pill-btn" :class="{ 'active': obj.collision === 'bounce' }" @click="obj.collision = 'bounce'; saveConfigRaw()">Bounce Off</div>
                                            <div class="pill-btn" :class="{ 'active': obj.collision === 'stick' }" @click="obj.collision = 'stick'; saveConfigRaw()">Stick</div>
                                            <div class="pill-btn" :class="{ 'active': obj.collision === 'squish' }" @click="obj.collision = 'squish'; saveConfigRaw()">Squish</div>
                                            <div class="pill-btn" :class="{ 'active': obj.collision === 'pixel-shatter' }" @click="obj.collision = 'pixel-shatter'; saveConfigRaw()">Pixel Shatter</div>
                                            <div class="pill-btn" :class="{ 'active': obj.collision === 'pass' }" @click="obj.collision = 'pass'; saveConfigRaw()">Pass Through</div>
                                        </div>
                                    </div>

                                    <div class="setting-group" style="margin-bottom:10px; display:flex; gap:15px;">
                                        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color:#fff; font-size:13px;">
                                            <input type="checkbox" x-model="obj.snapBottom" @change="saveConfigRaw()" style="width:16px; height:16px;"> Snap Bottom to Target
                                        </label>
                                        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color:#fff; font-size:13px;">
                                            <input type="checkbox" x-model="obj.randomMirror" @change="saveConfigRaw()" style="width:16px; height:16px;"> Random Mirroring
                                        </label>
                                    </div>

                                    <div style="font-size:11px; padding:8px; background:rgba(0,200,255,0.08); border:1px solid rgba(0,200,255,0.25); border-radius:4px; color:#aaa; margin-bottom:10px;">
                                        ⚠️ Requires OBS connected + tracking active. Mask mode uses the live pixel mask; Brightness mode works standalone.
                                    </div>
                                </div>
                            </template>
                               <!-- If type is webgl-water -->
                            <template x-if="obj.type === 'webgl-water'">
                                <div style="padding-top:10px;">
                                    <p style="font-size:11px; color:#aaa; margin:0 0 10px 0;">WebGL Cartoon Water: a high-performance water stream featuring customizable white outlines, cel-shaded reflections, and fluid dynamics.</p>

                                    <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:15px; background:rgba(0,0,0,0.25); padding:12px; border-radius:6px; border:1px solid rgba(255,255,255,0.08);">
                                         <label style="font-size:11px; color:#00aaff; font-weight:bold; letter-spacing:0.05em; text-transform:uppercase;">Water Color (RGBA Sliders)</label>
                                         
                                         <div style="display:flex; align-items:center; gap:10px;">
                                             <span style="font-size:11px; color:#ff4444; width:15px; font-weight:bold;">R</span>
                                             <input type="range" min="0" max="255" step="1" x-model.number="obj.colorR" @input="saveConfigRaw()" style="flex:1;">
                                             <span style="font-size:11px; color:#aaa; width:30px; text-align:right;" x-text="obj.colorR !== undefined ? obj.colorR : 0"></span>
                                         </div>

                                         <div style="display:flex; align-items:center; gap:10px;">
                                             <span style="font-size:11px; color:#00ff88; width:15px; font-weight:bold;">G</span>
                                             <input type="range" min="0" max="255" step="1" x-model.number="obj.colorG" @input="saveConfigRaw()" style="flex:1;">
                                             <span style="font-size:11px; color:#aaa; width:30px; text-align:right;" x-text="obj.colorG !== undefined ? obj.colorG : 170"></span>
                                         </div>

                                         <div style="display:flex; align-items:center; gap:10px;">
                                             <span style="font-size:11px; color:#00aaff; width:15px; font-weight:bold;">B</span>
                                             <input type="range" min="0" max="255" step="1" x-model.number="obj.colorB" @input="saveConfigRaw()" style="flex:1;">
                                             <span style="font-size:11px; color:#aaa; width:30px; text-align:right;" x-text="obj.colorB !== undefined ? obj.colorB : 255"></span>
                                         </div>

                                         <div style="display:flex; align-items:center; gap:10px;">
                                             <span style="font-size:11px; color:#ffffff; width:15px; font-weight:bold;">A</span>
                                             <input type="range" min="0.0" max="1.0" step="0.05" x-model.number="obj.colorA" @input="saveConfigRaw()" style="flex:1;">
                                             <span style="font-size:11px; color:#aaa; width:30px; text-align:right;" x-text="parseFloat(obj.colorA !== undefined ? obj.colorA : 0.95).toFixed(2)"></span>
                                         </div>

                                         <div class="water-color-preview-box">
                                             <div style="width:100%; height:100%; position:absolute; left:0; top:0;" 
                                                  :style="{ backgroundColor: 'rgba(' + (obj.colorR !== undefined ? obj.colorR : 0) + ',' + (obj.colorG !== undefined ? obj.colorG : 170) + ',' + (obj.colorB !== undefined ? obj.colorB : 255) + ',' + (obj.colorA !== undefined ? obj.colorA : 0.95) + ')' }">
                                             </div>
                                         </div>
                                    </div>
                                    <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:15px; background:rgba(0,0,0,0.25); padding:12px; border-radius:6px; border:1px solid rgba(255,255,255,0.08);">
                                          <label style="font-size:11px; color:#00aaff; font-weight:bold; letter-spacing:0.05em; text-transform:uppercase;">Water Highlight Color (RGBA Sliders)</label>
                                          
                                          <div style="display:flex; align-items:center; gap:10px;">
                                              <span style="font-size:11px; color:#ff4444; width:15px; font-weight:bold;">R</span>
                                              <input type="range" min="0" max="255" step="1" x-model.number="obj.color2R" @input="saveConfigRaw()" style="flex:1;">
                                              <span style="font-size:11px; color:#aaa; width:30px; text-align:right;" x-text="obj.color2R !== undefined ? obj.color2R : 100"></span>
                                          </div>

                                          <div style="display:flex; align-items:center; gap:10px;">

    <!-- UI Console Debug Bridge -->
    <script>
        (function() {
            const debugBox = document.getElementById('ui-debug-console');
            const oldLog = console.log;
            const oldErr = console.error;
            const oldWarn = console.warn;
            
            function printLine(msg, color) {
                if(!debugBox) return;
                const d = document.createElement('div');
                d.style.color = color;
                d.style.marginBottom = '4px';
                d.style.wordBreak = 'break-word';
                d.innerText = msg;
                debugBox.appendChild(d);
                if (debugBox.children.length > 100) debugBox.removeChild(debugBox.firstChild);
                debugBox.scrollTop = debugBox.scrollHeight;
            }

            function serializeArg(a) {
                if (a === null) return "null";
                if (a instanceof Error) return a.stack || a.message;
                if (typeof a === 'object') {
                    if (a.type === 'targets_update' || a.pixel_grid) return "[Tracking Data]";
                    try { 
                        let str = JSON.stringify(a); 
                        return str.length > 300 ? str.substring(0, 300) + "..." : str;
                    } catch(e) { return String(a); }
                }
                return String(a);
            }
            
            console.log = function(...args) {
                oldLog.apply(console, args);
                printLine(args.map(serializeArg).join(' '), '#0f0');
            };
            console.error = function(...args) {
                oldErr.apply(console, args);
                printLine('[ERROR] ' + args.map(serializeArg).join(' '), '#ff4444');
            };
            console.warn = function(...args) {
                oldWarn.apply(console, args);
                printLine('[WARN] ' + args.map(serializeArg).join(' '), '#ffcc00');
            };
        })();
    </script>
